name: Bug report
description: Report a reproducible builder, artifact, or Android runtime failure
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not disclose vulnerabilities or sensitive target data here. Use the
        private reporting link in SECURITY.md and redact device identifiers.

  - type: input
    id: frida-version
    attributes:
      label: Frida version
      description: Use the exact semantic version from build-info.json.
      placeholder: 17.16.3
    validations:
      required: true

  - type: textarea
    id: artifact-source
    attributes:
      label: Artifact source
      description: Link the workflow/release or provide the builder commit.
      placeholder: Workflow URL, release URL, or git commit
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - android-arm64
        - android-arm
        - android-x86_64
        - android-x86
        - Multiple architectures
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      description: Include the API level and device build when runtime behavior is involved.
      placeholder: Android 14, API 34
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Exact reproduction
      description: Include the complete command and the first failing step.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste the relevant failure output after removing secrets and identifiers.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I reproduced this with an unmodified checkout at the commit listed above.
          required: true
        - label: I removed secrets, package data, and device identifiers from this report.
          required: true
