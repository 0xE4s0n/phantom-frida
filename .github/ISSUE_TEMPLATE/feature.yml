name: Feature request
description: Propose a focused builder, verification, or maintenance improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete limitation and who encounters it.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest change that would solve the problem.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include workarounds or simpler approaches you evaluated.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Verification plan
      description: Explain how the change can be tested, including device evidence if applicable.
    validations:
      required: true
