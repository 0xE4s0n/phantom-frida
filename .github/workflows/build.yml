name: Build Custom Frida

on:
  workflow_call:
    inputs:
      frida_version:
        description: Frida version
        required: false
        type: string
        default: "17.16.3"
      custom_name:
        description: Replacement for the internal Frida name
        required: false
        type: string
        default: ajeossida
      arch:
        description: Comma-separated target architectures
        required: false
        type: string
        default: android-arm64
      port:
        description: Custom port; empty keeps the upstream default
        required: false
        type: string
        default: ""
      extended:
        description: Apply extended anti-detection patches
        required: false
        type: boolean
        default: true
      temp_fixes:
        description: Apply optional temporary stability fixes
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      frida_version:
        description: Frida version
        required: true
        type: string
        default: "17.16.3"
      custom_name:
        description: Replacement for the internal Frida name
        required: true
        type: string
        default: ajeossida
      arch:
        description: Target architecture(s)
        required: true
        type: choice
        default: android-arm64
        options:
          - android-arm64
          - android-arm
          - android-arm64,android-arm
          - android-arm64,android-arm,android-x86_64,android-x86
      port:
        description: Custom port; empty keeps the upstream default
        required: false
        type: string
        default: ""
      extended:
        description: Apply extended anti-detection patches
        required: false
        type: boolean
        default: true
      temp_fixes:
        description: Apply optional temporary stability fixes
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      ARCHITECTURES: ${{ inputs.arch }}
      CUSTOM_NAME: ${{ inputs.custom_name }}
      CUSTOM_PORT: ${{ inputs.port }}
      EXTENDED_PATCHES: ${{ inputs.extended }}
      FRIDA_VERSION: ${{ inputs.frida_version }}
      NDK_ARCHIVE_SHA1: 87e2bb7e9be5d6a1c6cdf5ec40dd4e0c6d07c30b
      NDK_ARCHIVE_URL: https://dl.google.com/android/repository/android-ndk-r29-linux.zip
      TEMPORARY_FIXES: ${{ inputs.temp_fixes }}

    steps:
      - name: Check out builder
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential curl git unzip

      - name: Restore immutable NDK
        id: ndk-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: build/android-ndk-r29
          key: android-ndk-r29-linux-87e2bb7e9be5d6a1c6cdf5ec40dd4e0c6d07c30b

      - name: Download and verify NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          archive="$RUNNER_TEMP/android-ndk-r29-linux.zip"
          mkdir -p build
          curl --fail --location --retry 3 --retry-all-errors \
            --output "$archive" "$NDK_ARCHIVE_URL"
          printf '%s  %s\n' "$NDK_ARCHIVE_SHA1" "$archive" | sha1sum --check -
          unzip -q "$archive" -d build

      - name: Validate NDK installation
        run: |
          grep -Fqx 'Pkg.Revision = 29.0.14206865' \
            build/android-ndk-r29/source.properties

      - name: Apply patches and build
        run: |
          command=(
            python3 build.py
            --version "$FRIDA_VERSION"
            --name "$CUSTOM_NAME"
            --arch "$ARCHITECTURES"
            --ndk-path build/android-ndk-r29
            --verify
          )

          if [[ -n "$CUSTOM_PORT" ]]; then
            command+=(--port "$CUSTOM_PORT")
          fi
          if [[ "$EXTENDED_PATCHES" == "true" ]]; then
            command+=(--extended)
          fi
          if [[ "$TEMPORARY_FIXES" == "true" ]]; then
            command+=(--temp-fixes)
          fi

          printf 'Running:'
          printf ' %q' "${command[@]}"
          printf '\n'
          "${command[@]}"

      - name: Verify release assets
        run: |
          python3 -m json.tool output/build-info.json > /dev/null
          cd output
          sha256sum --check SHA256SUMS

      - name: Upload verified build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: phantom-frida-build
          path: output/
          if-no-files-found: error
          retention-days: 30
