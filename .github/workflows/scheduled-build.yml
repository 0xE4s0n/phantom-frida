name: Weekly Stealth Build

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:
    inputs:
      frida_version:
        description: Device-verified Frida version
        required: false
        type: string
        default: "17.16.3"
      arch:
        description: Target architecture(s)
        required: true
        type: choice
        default: android-arm64
        options:
          - android-arm64
          - android-arm
          - android-arm64,android-arm

permissions:
  contents: read

concurrency:
  group: weekly-stealth-build
  cancel-in-progress: false

jobs:
  resolve:
    name: resolve inputs
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      REQUESTED_ARCHITECTURES: ${{ inputs.arch || 'android-arm64' }}
      REQUESTED_VERSION: ${{ inputs.frida_version || '17.16.3' }}
    outputs:
      arch: ${{ steps.resolve.outputs.arch }}
      name: ${{ steps.resolve.outputs.name }}
      port: ${{ steps.resolve.outputs.port }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Check out resolver
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Resolve and validate inputs
        id: resolve
        run: |
          version=$(python3 -c \
            'import build, sys; print(build.validate_version(sys.argv[1]))' \
            "$REQUESTED_VERSION")
          if [[ "$version" != "17.16.3" ]]; then
            echo "Automatic releases are limited to device-verified Frida 17.16.3" >&2
            exit 1
          fi
          arch=$(python3 -c \
            'import build, sys; print(",".join(build.parse_architectures(sys.argv[1])))' \
            "$REQUESTED_ARCHITECTURES")
          read -r name port < <(python3 namegen.py --weekly --port --quiet)
          python3 -c \
            'import build, sys; build.validate_custom_name(sys.argv[1]); build.validate_port(int(sys.argv[2]))' \
            "$name" "$port"

          {
            printf 'version=%s\n' "$version"
            printf 'arch=%s\n' "$arch"
            printf 'name=%s\n' "$name"
            printf 'port=%s\n' "$port"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build verified artifacts
    needs: resolve
    permissions:
      contents: read
    uses: ./.github/workflows/build.yml
    with:
      frida_version: ${{ needs.resolve.outputs.version }}
      custom_name: ${{ needs.resolve.outputs.name }}
      arch: ${{ needs.resolve.outputs.arch }}
      port: ${{ needs.resolve.outputs.port }}
      extended: true
      temp_fixes: false

  release:
    name: attest and release
    needs:
      - resolve
      - build
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
    env:
      ARCHITECTURES: ${{ needs.resolve.outputs.arch }}
      CUSTOM_NAME: ${{ needs.resolve.outputs.name }}
      CUSTOM_PORT: ${{ needs.resolve.outputs.port }}
      FRIDA_VERSION: ${{ needs.resolve.outputs.version }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Download verified build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: phantom-frida-build
          path: release-assets

      - name: Verify downloaded release assets
        run: |
          cd release-assets
          sha256sum --check SHA256SUMS
          python3 - "$FRIDA_VERSION" "$CUSTOM_NAME" "$CUSTOM_PORT" \
            "$ARCHITECTURES" <<'PY'
          import json
          import sys

          with open("build-info.json", encoding="utf-8") as stream:
              info = json.load(stream)

          expected = {
              "frida_version": sys.argv[1],
              "name": sys.argv[2],
              "port": int(sys.argv[3]),
              "architectures": sys.argv[4].split(","),
          }
          actual = {key: info.get(key) for key in expected}
          if actual != expected:
              raise SystemExit(f"build metadata mismatch: {actual!r} != {expected!r}")
          PY

      - name: Attest release assets
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: release-assets/*

      - name: Create unique GitHub release
        run: |
          tag="v${FRIDA_VERSION}-$(date -u +%Y%m%d)-run${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          title="Stealth build - ${CUSTOM_NAME} (Frida ${FRIDA_VERSION})"
          notes="$RUNNER_TEMP/release.md"

          {
            echo '## Verified custom Frida build'
            echo
            echo "- Frida version: ${FRIDA_VERSION}"
            echo "- Custom name: ${CUSTOM_NAME}"
            echo "- Custom port: ${CUSTOM_PORT}"
            echo "- Architectures: ${ARCHITECTURES}"
            echo "- Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Verify the downloaded files with \`sha256sum --check SHA256SUMS\`."
          } > "$notes"

          gh release create "$tag" \
            release-assets/* \
            --title "$title" \
            --notes-file "$notes"

      - name: Write job summary
        run: |
          {
            echo '## Weekly Stealth Build'
            echo
            echo "- Frida version: ${FRIDA_VERSION}"
            echo "- Custom name: ${CUSTOM_NAME}"
            echo "- Custom port: ${CUSTOM_PORT}"
            echo "- Architectures: ${ARCHITECTURES}"
          } >> "$GITHUB_STEP_SUMMARY"
